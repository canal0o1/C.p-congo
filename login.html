<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congo Pétrole | Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --gold: #f59e0b; 
            --gree-gray: #f2f2f2; 
        }
        
        body { 
            margin: 0; padding: 0;
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh;
            background: url('IMG_4394.jpeg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 1;
        }

        /* Carte Blanche style GREE */
        .oil-card { 
            position: relative; z-index: 10;
            background: #ffffff;
            border-radius: 20px;
            padding: 45px 25px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 { 
            color: var(--gold);
            font-size: 1.8rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        /* Style des champs gris clair */
        .input-modern { 
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            background-color: var(--gree-gray);
            color: #333;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .input-modern:focus { 
            border-color: var(--gold);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        /* Champ téléphone avec préfixe intégré */
        .phone-container {
            display: flex;
            align-items: center;
            background-color: var(--gree-gray);
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        
        .phone-prefix {
            padding-left: 18px;
            font-size: 1rem;
            color: #333;
            font-weight: 500;
        }
        
        .phone-container input {
            border: none;
            margin-bottom: 0;
            background: transparent;
            padding-left: 10px;
        }

        .phone-container:focus-within {
            border-color: var(--gold);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        /* Bouton Noir style GREE */
        .btn-black {
            width: 100%;
            padding: 18px;
            background-color: #000000;
            color: var(--gold);
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-black:active { transform: scale(0.97); opacity: 0.8; }

        /* Bouton contour pour l'inscription */
        .btn-outline {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: #ffffff;
            color: #333;
            border: 1px solid #333;
            border-radius: 30px;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            margin-top: 15px;
            font-size: 1rem;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="oil-card">
        <div class="text-center mb-10">
            <div class="inline-block p-4 rounded-full bg-amber-500/10 mb-3">
                <i class="fa-solid fa-droplet text-4xl text-amber-500"></i>
            </div>
            <h1>Congo Pétrole</h1>
            <p class="text-[9px] text-gray-500 uppercase tracking-[0.3em]">Accès Partenaire</p>
        </div>

        <form id="loginForm">
            <div class="phone-container">
                <span class="phone-prefix">+243</span>
                <input type="tel" id="phone" class="input-modern" placeholder="Numéro de téléphone" required>
            </div>
            
            <input type="password" id="password" placeholder="Mot de passe" class="input-modern" required>

            <button type="submit" id="loginBtn" class="btn-black">
                Se connecter
            </button>
        </form>

        <div class="mt-6">
            <a href="index.html" class="btn-outline">
                Créer un compte
            </a>
            <p class="mt-6 text-[10px] text-gray-400 uppercase tracking-widest font-bold">
                Sécurité & Confidentialité Garante
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const rawPhone = document.getElementById('phone').value.trim().replace(/\s/g, '');
            const phone = rawPhone.startsWith('243') ? rawPhone : '243' + rawPhone.replace(/^0/, '');
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            loginBtn.innerText = "CONNEXION...";

            try {
                const userRef = ref(db, 'congo_petrole/users/' + phone);
                const snapshot = await get(userRef);

                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    if (userData.password === password) {
                        localStorage.setItem('userPhone', phone);
                        alert("Heureux de vous revoir !");
                        window.location.href = "dashboard.html";
                    } else {
                        alert("Mot de passe incorrect.");
                        loginBtn.disabled = false;
                        loginBtn.innerText = "Se connecter";
                    }
                } else {
                    alert("Compte inconnu sur Congo Pétrole.");
                    loginBtn.disabled = false;
                    loginBtn.innerText = "Se connecter";
                }
            } catch (error) {
                alert("Erreur réseau.");
                loginBtn.disabled = false;
                loginBtn.innerText = "Se connecter";
            }
        });
    </script>
</body>
</html>
