<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congo Pétrole | Mon Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #f59e0b; --oil-black: #020617; }
        body { background: var(--oil-black); font-family: 'Inter', sans-serif; color: white; }
        
        .profile-card { 
            background: linear-gradient(135deg, #1e293b, #0f172a); 
            border-bottom: 3px solid var(--gold);
            border-radius: 0 0 40px 40px;
        }
        
        .menu-item { 
            background: rgba(30, 41, 59, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin: 8px 16px;
            border-radius: 15px;
            transition: 0.3s; 
        }
        .menu-item:active { background: rgba(245, 158, 11, 0.1); transform: scale(0.98); }
        
        .action-btn { 
            background: rgba(245, 158, 11, 0.1); 
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 20px;
        }

        .nav-bottom { 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(15px); 
            border-top: 1px solid rgba(245, 158, 11, 0.2); 
        }
    </style>
</head>
<body class="pb-32">

    <div class="profile-card p-8 pt-12 shadow-2xl">
        <div class="flex items-center gap-5">
            <div class="relative">
                <div class="w-20 h-20 rounded-2xl bg-amber-500 flex items-center justify-center border-4 border-slate-900 shadow-xl overflow-hidden">
                    <img src="IMG_4593.jpeg" class="w-full h-full object-cover">
                </div>
                <div class="absolute -bottom-2 -right-2 bg-green-500 w-6 h-6 rounded-full border-4 border-slate-900"></div>
            </div>
            <div>
                <p id="displayPhone" class="text-2xl font-black italic tracking-tighter text-white">+243 ...</p>
                <div class="flex items-center gap-2">
                    <span class="text-[9px] px-2 py-0.5 bg-amber-500 text-black font-black rounded uppercase">Investisseur</span>
                    <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">ID Vérifié</span>
                </div>
            </div>
        </div>

        <div class="mt-8 bg-white/5 rounded-3xl p-6 border border-white/10 backdrop-blur-md">
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-[10px] font-black text-amber-500 uppercase tracking-[0.2em] mb-1">Portefeuille Pétrolier</p>
                    <p id="userBalance" class="text-3xl font-black italic tracking-tighter">FC 0</p>
                </div>
                <i class="fa-solid fa-chart-line text-amber-500/30 text-4xl"></i>
            </div>
        </div>
    </div>

    <div class="px-4 -mt-6 grid grid-cols-3 gap-3 relative z-10">
        <a href="recharge.html" class="action-btn p-4 flex flex-col items-center shadow-lg bg-slate-900">
            <i class="fa-solid fa-plus-circle text-amber-500 text-xl mb-2"></i>
            <span class="text-[9px] font-black uppercase">Recharger</span>
        </a>
        <a href="retrait.html" class="action-btn p-4 flex flex-col items-center shadow-lg bg-slate-900">
            <i class="fa-solid fa-money-bill-transfer text-amber-500 text-xl mb-2"></i>
            <span class="text-[9px] font-black uppercase">Retrait</span>
        </a>
        <a href="releve.html" class="action-btn p-4 flex flex-col items-center shadow-lg bg-slate-900">
            <i class="fa-solid fa-history text-amber-500 text-xl mb-2"></i>
            <span class="text-[9px] font-black uppercase">Historique</span>
        </a>
    </div>

    <div class="mt-8 space-y-1">
        <div class="px-6 mb-4">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Paramètres & Aide</p>
        </div>

        <a href="mes_investissements.html" class="menu-item flex items-center justify-between p-5">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-drilling-rig text-amber-500"></i>
                <span class="text-sm font-bold text-slate-200">Mes Gisements Actifs</span>
            </div>
            <i class="fa-solid fa-chevron-right text-slate-600 text-xs"></i>
        </a>

        <a href="#" class="menu-item flex items-center justify-between p-5">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-shield-halved text-amber-500"></i>
                <span class="text-sm font-bold text-slate-200">Sécurité du compte</span>
            </div>
            <i class="fa-solid fa-chevron-right text-slate-600 text-xs"></i>
        </a>

        <a href="support.html" class="menu-item flex items-center justify-between p-5">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-headset text-amber-500"></i>
                <span class="text-sm font-bold text-slate-200">Assistance Technique</span>
            </div>
            <i class="fa-solid fa-chevron-right text-slate-600 text-xs"></i>
        </a>

        <button onclick="logout()" class="w-[calc(100%-32px)] mx-4 mt-6 bg-red-500/10 border border-red-500/20 p-5 rounded-2xl flex items-center justify-between transition-all active:scale-95">
            <span class="text-sm font-black text-red-500 uppercase italic">Fermer la session</span>
            <i class="fa-solid fa-power-off text-red-500"></i>
        </button>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 nav-bottom p-5 flex justify-around items-center z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-slate-500">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[9px] font-bold mt-1 uppercase">Puits</span>
        </a>
        <a href="produit.html" class="flex flex-col items-center text-slate-500">
            <i class="fa-solid fa-bag-shopping text-xl"></i>
            <span class="text-[9px] font-bold mt-1 uppercase">Marché</span>
        </a>
        <a href="equipe.html" class="flex flex-col items-center text-slate-500">
            <i class="fa-solid fa-users text-xl"></i>
            <span class="text-[9px] font-bold mt-1 uppercase">Réseau</span>
        </a>
        <a href="compte.html" class="flex flex-col items-center text-amber-500">
            <i class="fa-solid fa-user text-xl"></i>
            <span class="text-[9px] font-bold mt-1 uppercase tracking-tighter">Profil</span>
        </a>
    </nav>

    <script>
        // Configuration Congo Pétrole
        const DB_URL = "https://firstsolar-e2ba3-default-rtdb.firebaseio.com/congo_petrole/users";
        const userPhone = localStorage.getItem('userPhone');

        async function fetchUserProfile() {
            // SÉCURITÉ ENLEVÉE : Pas de redirection forcée vers index.html
            if (!userPhone) {
                document.getElementById('displayPhone').innerText = "Mode Invité";
                document.getElementById('userBalance').innerText = "FC 0";
                return;
            }

            try {
                document.getElementById('displayPhone').innerText = `+${userPhone}`;

                const response = await fetch(`${DB_URL}/${userPhone}.json`);
                const user = await response.json();

                if (user) {
                    document.getElementById('userBalance').innerText = `FC ${parseFloat(user.balance || 0).toLocaleString()}`;
                }
            } catch (error) {
                console.error("Erreur de récupération:", error);
            }
        }

        function logout() {
            if(confirm("Voulez-vous vraiment fermer votre session pétrolière ?")) {
                localStorage.removeItem('userPhone');
                location.reload(); // On recharge pour passer en mode invité
            }
        }

        window.onload = fetchUserProfile;
    </script>
</body>
</html>
