<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congo Pétrole | Inscription Officielle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --gold: #f59e0b; 
            --dark-oil: #020617; 
        }
        
        /* Centralisation absolue et fond image */
        body { 
            margin: 0; padding: 0;
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh;
            background: url('IMG_4394.jpeg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Superposition sombre sur l'image de fond */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 1;
        }

        /* Carte Glassmorphism Modernisée */
        .oil-card { 
            position: relative; z-index: 10;
            background: rgba(15, 23, 42, 0.85); /* Fond sombre mais translucide */
            backdrop-filter: blur(15px); /* Effet de flou de verre */
            border: 2px solid rgba(245, 158, 11, 0.2); /* Bordure or légère */
            border-radius: 30px;
            padding: 35px 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        /* Titre doré et italique */
        h1 { 
            color: var(--gold);
            font-size: 2.2rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
        }

        /* Style des Champs de Saisie (Glassmorphism) */
        .input-group { margin-bottom: 20px; text-align: left; }
        
        input { 
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03); /* Très léger fond */
            color: white;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        input:focus { 
            border-color: var(--gold);
            background: rgba(245, 158, 11, 0.05); /* Accent or léger */
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.2);
        }

        input::placeholder { color: rgba(255, 255, 255, 0.3); }

        /* Bouton "Or" Premium */
        .btn-gold {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #000;
            border: none;
            border-radius: 15px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(217, 119, 6, 0.4);
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .btn-gold:active { transform: scale(0.96); }

        /* Lien pied de page */
        .login-link { 
            color: var(--gold);
            font-weight: bold;
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="oil-card">
        <div class="text-center mb-10">
            <div class="inline-block p-4 rounded-full bg-amber-500/10 mb-4 ring-2 ring-amber-500/30">
                <i class="fa-solid fa-droplet text-5xl text-amber-500 animate-pulse"></i>
            </div>
            <h1>Congo Pétrole</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-[0.4em] mt-2">Investissement Énergétique</p>
        </div>

        <form id="registerForm">
            <div class="input-group">
                <input type="tel" id="phone" placeholder="Numéro Téléphone (243...)" class="input-modern" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Mot de passe (6 chiffres)" class="input-modern" required>
            </div>
            <div class="input-group">
                <input type="text" id="inviteCode" placeholder="Code d'invitation Parrain" class="input-modern" required>
            </div>

            <button type="submit" id="submitBtn" class="btn-gold">
                Démarrer l'Exploitation
            </button>
        </form>

        <p class="text-center mt-8 text-xs text-gray-500 uppercase font-medium">
            Déjà partenaire ? <a href="login.html" class="login-link">Se connecter</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Configuration Firebase (Assurez-vous d'avoir remplacé ces valeurs par les vôtres)
        const firebaseConfig = {
            databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- DÉTECTION AUTOMATIQUE DU CODE PARRAIN DANS L'URL ---
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref'); // Cherche ?ref=CMSXXXXX
            if (refCode) {
                document.getElementById('inviteCode').value = refCode;
            }
        });

        document.getElementById("registerForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim().replace(/\+/g, '');
            const password = document.getElementById('password').value.trim();
            const inviteCode = document.getElementById('inviteCode').value.trim();
            const submitBtn = document.getElementById('submitBtn');

            // Validation minimale du mot de passe
            if (password.length < 6 || !/^\d+$/.test(password)) {
                return alert("Le mot de passe doit contenir au moins 6 chiffres.");
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "FORAGE EN COURS...";

            try {
                // Utilisation d'un dossier dédié 'congo_petrole' pour ne pas écraser vos autres projets
                const userRef = ref(db, 'congo_petrole/users/' + phone);
                const snapshot = await get(userRef);

                if (snapshot.exists()) {
                    alert("Ce compte existe déjà. Connectez-vous.");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Démarrer l'Exploitation";
                } else {
                    await set(userRef, {
                        phone: phone,
                        password: password, // Important : Stockage en clair pour test, à chiffrer en production !
                        referralBy: inviteCode,
                        balance: 0,
                        lastProfit: Date.now(),
                        dateJoined: new Date().toLocaleString(),
                        // Génération du code personnel pour l'utilisateur
                        myInviteCode: "PETROL" + phone.slice(-4)
                    });
                    
                    alert("Compte Congo Pétrole créé avec succès !");
                    window.location.href = "login.html";
                }
            } catch (error) {
                alert("Erreur réseau. Veuillez réessayer.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Démarrer l'Exploitation";
            }
        });
    </script>
</body>
</html>
